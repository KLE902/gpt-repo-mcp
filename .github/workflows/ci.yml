name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.x
          - 22.x

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Contract tests
        run: npm test -- tests/tool-contracts.test.ts tests/mcp-contract.test.ts

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Public hygiene
        run: npm run check:public

      - name: Build
        run: npm run build

      - name: Whitespace check
        run: git diff --check

  windows-desktop-launcher:
    name: Windows desktop launcher
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify allowlisted npm scripts on Windows
        run: npm test -- tests/allowed-script-service.test.ts

      - name: Install desktop launcher through npm
        shell: powershell
        run: npm run install:desktop-launcher -- -Force

      - name: Verify generated launcher
        shell: powershell
        run: |
          $desktop = [Environment]::GetFolderPath([Environment+SpecialFolder]::DesktopDirectory)
          $launcherPath = Join-Path $desktop "Start GPT Repo MCP.cmd"
          if (-not (Test-Path -LiteralPath $launcherPath -PathType Leaf)) {
            throw "Desktop launcher was not created: $launcherPath"
          }

          $repoPath = (Resolve-Path ".").Path
          $launcher = [System.IO.File]::ReadAllText($launcherPath)
          $expectedCd = "cd /d `"$repoPath`""
          if (-not $launcher.Contains($expectedCd)) {
            throw "Desktop launcher does not target the checked-out repository."
          }
          if (-not $launcher.Contains("call npm.cmd run connect")) {
            throw "Desktop launcher does not start the connector through npm.cmd."
          }
          if (-not $launcher.Contains("pause")) {
            throw "Desktop launcher does not keep the window open for diagnostics."
          }
